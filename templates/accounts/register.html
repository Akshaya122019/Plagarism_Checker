{% extends 'base.html' %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm border-0 mt-4">
      <div class="card-body p-5">
        <h4 class="fw-bold text-center mb-4">
          <i class="fas fa-user-plus text-primary me-2"></i>Create Account
        </h4>

        <div id="error-msg" class="alert alert-danger d-none"></div>
        <div id="success-msg" class="alert alert-success d-none"></div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">First Name</label>
            <input type="text" id="first_name" class="form-control">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Last Name</label>
            <input type="text" id="last_name" class="form-control">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" id="username" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" id="email" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" id="password" class="form-control">
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Confirm Password</label>
          <input type="password" id="password2" class="form-control">
        </div>

        <button id="register-btn" class="btn btn-primary w-100 py-2 fw-semibold">
          <span id="btn-text">Create Account</span>
          <span id="btn-spinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
        </button>

        <p class="text-center mt-3 mb-0">
          Already have an account? <a href="/accounts/login/">Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$('#register-btn').click(function() {
  const data = {
    first_name: $('#first_name').val().trim(),
    last_name: $('#last_name').val().trim(),
    username: $('#username').val().trim(),
    email: $('#email').val().trim(),
    password: $('#password').val(),
    password2: $('#password2').val(),
  };

  if (!data.username || !data.email || !data.password) {
    $('#error-msg').text('Please fill in all required fields.').removeClass('d-none');
    return;
  }

  $('#btn-text').text('Creating account...');
  $('#btn-spinner').removeClass('d-none');
  $('#register-btn').prop('disabled', true);
  $('#error-msg').addClass('d-none');

  $.ajax({
    url: '/accounts/api/register/',
    method: 'POST',
    contentType: 'application/json',
    data: JSON.stringify(data),
    success: function(res) {
      Auth.setTokens(res.access, res.refresh);
      $('#success-msg').text('Account created! Redirecting...').removeClass('d-none');
      setTimeout(() => window.location.href = '/checker/', 1500);
    },
    error: function(xhr) {
      const errors = xhr.responseJSON;
      let msg = '';
      for (const key in errors) {
        msg += errors[key][0] + ' ';
      }
      $('#error-msg').text(msg || 'Registration failed.').removeClass('d-none');
      $('#btn-text').text('Create Account');
      $('#btn-spinner').addClass('d-none');
      $('#register-btn').prop('disabled', false);
    }
  });
});
</script>
{% endblock %}
